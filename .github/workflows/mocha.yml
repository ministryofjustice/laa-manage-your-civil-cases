name: Mocha Unit tests
on:
  workflow_dispatch: # Allow manual triggering only
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  mocha-unit-tests:
    name: Mocha Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Yarn 4
        uses: ./.github/actions/cache-yarn

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node

      - name: Run Mocha unit tests & c8 code coverage
        run: yarn c8 yarn test:unit --check-coverage
        env:
          CI: true
          # Add session-related environment variables for unit tests
          SESSION_SECRET: "mocha-test-secret" # Use a simple test secret for Mocha unit tests
          SESSION_NAME: "sessionId"
          ENTRA_TENANT_ID: 'test-tenant-id'
          ENTRA_CLIENT_ID: 'test-client-id'
          ENTRA_APP_ID: 'test-app-id'
          ENTRA_CLIENT_SECRET: 'test-client-secret'
          ENTRA_REDIRECT_URI: 'http://localhost:3001/auth/callback'
          ENTRA_POST_LOGOUT_REDIRECT_URI: 'http://localhost:3001/auth/logout'
          ENTRA_AUTHORITY: 'https://login.microsoftonline.com/test-tenant-id'
          SILAS_SCOPES: 'openid profile email'
          SILAS_EXPECTED_AUDIENCE: 'test-client-id'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-coverage-report
          path: coverage/