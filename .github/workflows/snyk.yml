name: Local Snyk Docker Image Scan

on:
  workflow_call:
    inputs:
      tag:
        description: "Label to tag the docker image with"
        required: true
        type: string
      dockerfile_path:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
    secrets:
      snyk_token:
        description: "Snyk service account API token"
        required: true

jobs:
  snyk:
    name: Scan docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build \
            --tag ${{ inputs.tag }}:scan \
            --file ${{ inputs.dockerfile_path }} .

      - name: Scan docker image using Snyk (SARIF)
        continue-on-error: true
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.snyk_token }}
        with:
          image: ${{ inputs.tag }}:scan
          args: --file=${{ inputs.dockerfile_path }} --sarif-file-output=snyk.sarif --json

      - name: Monitor docker image using Snyk
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.snyk_token }}
        with:
          command: monitor
          image: ${{ inputs.tag }}:scan
          args: --file=${{ inputs.dockerfile_path }}
        
      - name: Replace security-severity "null" for license-related findings 
        run: |
          sed -i 's/"security-severity": "null"/"security-severity": "0"/g' snyk.sarif

      - name: Replace security-severity "undefined" for license-related findings 
        run: |
          sed -i 's/"security-severity": "undefined"/"security-severity": "0"/g' snyk.sarif
      
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
